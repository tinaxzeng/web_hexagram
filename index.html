<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>農曆出生時間轉換器</title>
    <style>
        :root {
            --primary-brown: #795548;
            --accent-red: #ff5252;
            --bg-grey: #f5f5f5;
            --card-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-grey);
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        header {
            background-color: #d7ccc8; /* primaryContainer */
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary-brown);
        }

        header h1 {
            margin: 0;
            color: var(--primary-brown);
            font-size: 24px;
        }

        .input-section {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .result-section {
            padding: 30px 20px;
            text-align: center;
        }

        .divider {
            margin: 20px 0;
            border-top: 2px solid #eee;
            position: relative;
        }

        .divider::after {
            content: "轉換結果";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 0 15px;
            color: var(--primary-brown);
            font-weight: bold;
        }

        .stem-branch {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary-brown);
            letter-spacing: 4px;
            margin: 10px 0;
        }

        .branch-time {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        /* 年份換算工具樣式 */
        .converter-section {
            background-color: #fdfaf8;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }
        .converter-section label {
            font-weight: bold;
            color: var(--primary-brown);
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }
        .converter-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .converter-inputs input {
            padding: 10px;
            font-size: 16px;
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        #applyYearBtn {
            padding: 10px 15px;
            background-color: var(--primary-brown);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
            transition: background-color 0.2s;
        }
        #applyYearBtn:hover {
            background-color: #5d4037;
        }

        /* 六爻顯示區域強化 */
        .hexagram-container {
            background: #fffdfb;
            padding: 20px 10px;
            border-radius: 12px;
            border: 1px dashed var(--primary-brown);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 400px;
            padding: 30px;
        }

        .lunar-detail {
            font-size: 20px;
            color: var(--primary-brown);
            margin-top: 5px;
        }

        .hexagram-name {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent-red);
            margin-top: 15px;
        }

        /* 六爻顯示區域佈局 */
        .yao-display {
            display: flex;
            flex-direction: column-reverse; /* 易經由下往上排 */
            gap: 20px;
            margin: 20px 0;
            width: 100%;
        }

        .yao-line-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            animation: yaoFadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        /* 世應樣式 */
        .shi-ying-box {
            width: 30px;
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-red);
            text-align: center;
        }

        /* 爻線本體（加大） */
        .yao-bar {
            height: 18px;
            width: 200px;
            display: flex;
            justify-content: space-between;
        }

        .yao-bar.yang {
            background-color: #333;
        }

        .yao-bar.yin .segment {
            width: 42%;
            height: 100%;
            background-color: #333;
        }

        @keyframes yaoFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 文字資訊樣式（加大） */
        .yao-text {
            flex: 1;
            font-size: 24px;
            font-weight: bold;
            text-align: left;
            white-space: nowrap;
            min-width: 140px;
        }

        /* 五行顏色定義 */
        .elem-木 { color: #2e7d32; }
        .elem-火 { color: #d32f2f; }
        .elem-土 { color: #795548; }
        .elem-金 { color: #f9a825; }
        .elem-水 { color: #1976d2; }

        /* 逐爻延遲動畫 */
        .yao-line-wrapper:nth-child(1) { animation-delay: 0.1s; }
        .yao-line-wrapper:nth-child(2) { animation-delay: 0.2s; }
        .yao-line-wrapper:nth-child(3) { animation-delay: 0.3s; }
        .yao-line-wrapper:nth-child(4) { animation-delay: 0.4s; }
        .yao-line-wrapper:nth-child(5) { animation-delay: 0.5s; }
        .yao-line-wrapper:nth-child(6) { animation-delay: 0.6s; }

        footer {
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>農曆出生轉換器</h1>
    </header>

    <!-- 民國轉西元換算工具 -->
    <div class="converter-section">
        <label>年份快速換算 (民國 ➔ 西元)</label>
        <div class="converter-inputs">
            <input type="number" id="convertRocInput" placeholder="輸入民國年 (如: 113)">
            <span style="color: var(--primary-brown); font-weight: bold;">➔</span>
            <input type="text" id="resultGregOutput" readonly placeholder="西元年份" style="background-color: #f0f0f0; cursor: default;">
            <button id="applyYearBtn">自動填入</button>
        </div>
    </div>

    <div class="input-section">
        <div class="input-group">
            <label>出生日期 (民國國曆) <span id="rocInputHint" style="color: var(--primary-brown); font-weight: bold;"></span></label>
            <input type="date" id="datePicker">
        </div>
        <div class="input-group">
            <label>出生時間</label>
            <input type="time" id="timePicker">
        </div>
    </div>

    <div class="result-section">
        <div class="divider"></div>
        
        <div id="stemBranchYear" class="stem-branch" style="font-size: 36px;">--</div>
        <div id="lunarDateDisplay" class="lunar-detail">--</div>
        <div id="branchTime" class="branch-time">出生時辰：--時</div>
        <div id="dayPillarDisplay" class="lunar-detail" style="font-weight: bold; color: var(--accent-red); margin-bottom: 10px;"></div>

        <div class="hexagram-container">
            <div id="yaoDisplay" class="yao-display"></div>
            <div id="hexagramSymbolSmall" class="hexagram-symbol-small"></div>
            <div id="hexagramName" class="hexagram-name">計算中</div>
        </div>
    </div>

    <footer>
        註：此為簡易起卦，僅供參考
    </footer>
</div>

<script>
    const stems = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    const branches = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
    
    const hexagramNames = [
        // [0] 上卦為天 (乾金...)
    ['乾為天', '澤天夬', '火天大有', '雷天大壯', '風天小畜', '水天需', '山天大畜', '地天泰'],
    // [1] 上卦為澤 (兌金...)
    ['天澤履', '兌為澤', '火澤睽', '雷澤歸妹', '風澤中孚', '水澤節', '山澤損', '地澤臨'],
    // [2] 上卦為火 (離火...)
    ['天火同人', '澤火革', '離為火', '雷火豐', '風火家人', '水火既濟', '山火賁', '地火明夷'],
    // [3] 上卦為雷 (震木...)
    ['天雷無妄', '澤雷隨', '火雷噬嗑', '震為雷', '風雷益', '水雷屯', '山雷頤', '地雷復'],
    // [4] 上卦為風 (巽木...)
    ['天風姤', '澤風大過', '火風鼎', '雷風恆', '巽為風', '風水渙', '山風蠱', '地風升'],
    // [5] 上卦為水 (坎水...)
    ['天水訟', '澤水困', '火水未濟', '雷水解', '風水渙', '坎為水', '山水蒙', '地水師'],
    // [6] 上卦為山 (艮土...)
    ['天山遯', '澤山咸', '火山旅', '雷山小過', '風山漸', '水山蹇', '艮為山', '地山謙'],
    // [7] 上卦為地 (坤土...)
    ['天地否', '澤地萃', '火地晉', '雷地豫', '風地觀', '水地比', '山地剝', '坤為地']
    ];

    const hexagramSymbols = [
        ['䷀', '䷉', '䷌', '䷘', '䷫', '䷅', '䷠', '䷊'],
        ['䷪', '䷹', '䷰', '䷐', '䷛', '䷮', '䷞', '䷒'],
        ['䷍', '䷥', '䷝', '䷔', '䷱', '䷿', '䷷', '䷣'],
        ['䷡', '䷵', '䷶', '䷲', '䷟', '䷧', '䷽', '䷗'],
        ['䷈', '䷼', '䷤', '䷩', '䷸', '䷺', '䷴', '䷭'],
        ['䷄', '䷻', '䷾', '䷂', '䷯', '䷜', '䷦', '䷆'],
        ['䷙', '䷨', '䷕', '䷚', '䷑', '䷃', '䷳', '䷎'],
        ['䷊', '䷒', '䷣', '䷗', '䷭', '䷆', '䷎', '䷁']
    ];

    // 64 卦對應之八宮與世爻位置 (p:宮位, s:世爻位置)
    // 宮位順序: 乾0, 兌1, 離2, 震3, 巽4, 坎5, 艮6, 坤7
    const hexMeta = {
        "0,0": {p:0, s:6}, "4,0": {p:0, s:1}, "6,0": {p:0, s:2}, "7,0": {p:0, s:3}, "7,4": {p:0, s:4}, "7,6": {p:0, s:5}, "5,6": {p:0, s:4}, "5,0": {p:0, s:3}, // 乾宮
        "1,1": {p:1, s:6}, "5,1": {p:1, s:1}, "7,1": {p:1, s:2}, "6,1": {p:1, s:3}, "6,5": {p:1, s:4}, "6,7": {p:1, s:5}, "4,7": {p:1, s:4}, "4,1": {p:1, s:3}, // 兌宮
        "2,2": {p:2, s:6}, "6,2": {p:2, s:1}, "4,2": {p:2, s:2}, "5,2": {p:2, s:3}, "5,6": {p:2, s:4}, "5,4": {p:2, s:5}, "7,4": {p:2, s:4}, "7,2": {p:2, s:3}, // 離宮
        "3,3": {p:3, s:6}, "7,3": {p:3, s:1}, "5,3": {p:3, s:2}, "4,3": {p:3, s:3}, "4,7": {p:3, s:4}, "4,5": {p:3, s:5}, "6,5": {p:3, s:4}, "6,3": {p:3, s:3}, // 震宮
        "4,4": {p:4, s:6}, "0,4": {p:4, s:1}, "2,4": {p:4, s:2}, "3,4": {p:4, s:3}, "3,0": {p:4, s:4}, "3,2": {p:4, s:5}, "1,2": {p:4, s:4}, "1,4": {p:4, s:3}, // 巽宮
        "5,5": {p:5, s:6}, "1,5": {p:5, s:1}, "3,5": {p:5, s:2}, "2,5": {p:5, s:3}, "2,1": {p:5, s:4}, "2,3": {p:5, s:5}, "0,3": {p:5, s:4}, "0,5": {p:5, s:3}, // 坎宮
        "6,6": {p:6, s:6}, "2,6": {p:6, s:1}, "0,6": {p:6, s:2}, "1,6": {p:6, s:3}, "1,2": {p:6, s:4}, "1,0": {p:6, s:5}, "3,0": {p:6, s:4}, "3,6": {p:6, s:3}, // 艮宮
        "7,7": {p:7, s:6}, "3,7": {p:7, s:1}, "1,7": {p:7, s:2}, "0,7": {p:7, s:3}, "0,3": {p:7, s:4}, "0,1": {p:7, s:5}, "2,1": {p:7, s:4}, "2,7": {p:7, s:3}  // 坤宮
    };

    const palaceNames = ['乾', '兌', '離', '震', '巽', '坎', '艮', '坤'];
    const palaceElements = ['金', '金', '火', '木', '木', '水', '土', '土'];
    const branchElements = {'子':'水', '丑':'土', '寅':'木', '卯':'木', '辰':'土', '巳':'火', '午':'火', '未':'土', '申':'金', '酉':'金', '戌':'土', '亥':'水'};
    const trigramNaJia = [
        {s:['甲','壬'], b:[['子','寅','辰'],['午','申','戌']]}, // 0 乾
        {s:['丁','丁'], b:[['巳','卯','丑'],['亥','酉','未']]}, // 1 兌
        {s:['己','己'], b:[['卯','丑','亥'],['酉','未','巳']]}, // 2 離
        {s:['庚','庚'], b:[['子','寅','辰'],['午','申','戌']]}, // 3 震
        {s:['辛','辛'], b:[['丑','亥','酉'],['未','巳','卯']]}, // 4 巽
        {s:['戊','戊'], b:[['寅','辰','午'],['申','戌','子']]}, // 5 坎
        {s:['丙','丙'], b:[['辰','午','申'],['戌','子','寅']]}, // 6 艮
        {s:['乙','癸'], b:[['未','巳','卯'],['丑','亥','酉']]}  // 7 坤
    ];

    function getLiuQin(palaceElem, branchElem) {
        const order = ['金', '水', '木', '火', '土', '金', '水', '木', '火', '土'];
        const pIdx = order.indexOf(palaceElem);
        let bIdx = order.indexOf(branchElem, pIdx);
        if (bIdx === -1) bIdx = order.indexOf(branchElem);
        const diff = (bIdx - pIdx + 5) % 5;
        switch(diff) {
            case 0: return '兄弟';
            case 1: return '子孫';
            case 2: return '妻財';
            case 3: return '官鬼';
            case 4: return '父母';
        }
        return '';
    }

    // 八宮卦爻象定義 (1代表陽爻，0代表陰爻) - 由下往上排列
    const trigramLinesMap = [
        [1, 1, 1], // 0: 乾 (天)
        [1, 1, 0], // 1: 兌 (澤)
        [1, 0, 1], // 2: 離 (火)
        [1, 0, 0], // 3: 震 (雷)
        [0, 1, 1], // 4: 巽 (風)
        [0, 1, 0], // 5: 坎 (水)
        [0, 0, 1], // 6: 艮 (山)
        [0, 0, 0]  // 7: 坤 (地)
    ];

    // 初始化日期時間為現在
    const now = new Date();
    const dateInput = document.getElementById('datePicker');
    const timeInput = document.getElementById('timePicker');
    const yaoDisplay = document.getElementById('yaoDisplay');
    
    dateInput.value = now.toISOString().split('T')[0];
    timeInput.value = now.toTimeString().slice(0, 5);

    // 民國轉西元換算邏輯
    const convertRocInput = document.getElementById('convertRocInput');
    const resultGregOutput = document.getElementById('resultGregOutput');
    const applyYearBtn = document.getElementById('applyYearBtn');

    convertRocInput.addEventListener('input', () => {
        const rocYear = parseInt(convertRocInput.value);
        if (!isNaN(rocYear) && rocYear > 0) {
            resultGregOutput.value = `西元 ${rocYear + 1911} 年`;
        } else {
            resultGregOutput.value = '';
        }
    });

    applyYearBtn.addEventListener('click', () => {
        const rocYear = parseInt(convertRocInput.value);
        if (!isNaN(rocYear) && rocYear > 0) {
            const gregYear = rocYear + 1911;
            const currentVal = dateInput.value; // YYYY-MM-DD
            const parts = currentVal.split('-');
            if (parts.length === 3) {
                dateInput.value = `${gregYear}-${parts[1]}-${parts[2]}`;
                updateConversion();
            }
        }
    });

    function updateConversion() {
        const date = new Date(dateInput.value);
        const [hours, minutes] = timeInput.value.split(':').map(Number);

        // 1. 計算天干地支年
        const year = date.getFullYear();
        const rocYear = year - 1911;
        const yearIndex = (year - 4) % 60;
        const stemBranchYear = stems[yearIndex % 10] + branches[yearIndex % 12] + '年';

        // 1.5 日柱與旬空計算 (以 2000/1/1 戊午日為基準)
        const baseDate = new Date(2000, 0, 1);
        const calcDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const diffDays = Math.floor((calcDate.getTime() - baseDate.getTime()) / (24 * 3600 * 1000));
        let dayIdx = (54 + diffDays) % 60;
        if (dayIdx < 0) dayIdx += 60;
        const dayStemIdx = dayIdx % 10;
        const dayZhiIdx = dayIdx % 12;
        const v1Idx = (dayZhiIdx - dayStemIdx - 2 + 12) % 12;
        const v2Idx = (dayZhiIdx - dayStemIdx - 1 + 12) % 12;
        const voidBranches = [branches[v1Idx], branches[v2Idx]];
        document.getElementById('dayPillarDisplay').innerText = `日柱：${stems[dayStemIdx]}${branches[dayZhiIdx]} (旬空：${voidBranches.join('')})`;
        
        // 更新上方輸入提示
        document.getElementById('rocInputHint').innerText = `(民國 ${rocYear} 年)`;
        
        // 更新結果區域：顯示民國年與天干農曆年
        document.getElementById('stemBranchYear').innerHTML = `民國 ${rocYear} 年<br><span style="font-size: 48px;">${stemBranchYear}</span>`;

        // 2. 計算時辰
        const branchIndex = Math.floor(((hours + 1) % 24) / 2);
        const branchTime = branches[branchIndex];
        document.getElementById('branchTime').innerText = `出生時辰：${branchTime}時`;

        // 3. 取卦邏輯 (使用系統轉換後的農曆月日)
        let lunarMonth, lunarDay;
        try {
            // 透過 Intl API 取得轉換後的農曆數值 (month: 1-12, day: 1-30)
            const lunarParts = new Intl.DateTimeFormat('zh-u-ca-chinese', { month: 'numeric', day: 'numeric' }).formatToParts(date);
            lunarMonth = parseInt(lunarParts.find(p => p.type === 'month').value);
            lunarDay = parseInt(lunarParts.find(p => p.type === 'day').value);
            
            // 獲取顯示用的農曆字串 (例如：臘月廿一)
            const lunarDateStr = new Intl.DateTimeFormat('zh-u-ca-chinese', {month:'long', day:'numeric'}).format(date);
            document.getElementById('lunarDateDisplay').innerText = `農曆：${lunarDateStr}`;
        } catch(e) {
            // 錯誤處理：若系統不支援農曆轉換則回退至國曆數值
            lunarMonth = date.getMonth() + 1;
            lunarDay = date.getDate();
            document.getElementById('lunarDateDisplay').innerText = "農曆轉換失敗 (改用國曆計算)";
        }

        // 下卦由農曆月份決定 (Java 版 Row 索引)，上卦由農曆日期決定 (Java 版 Col 索引)
        const l = (lunarMonth - 1) % 8; 
        const u = (lunarDay - 1) % 8;

        // 更新卦名與符號
        if (hexagramNames[l] && hexagramNames[l][u]) {
            document.getElementById('hexagramName').innerText = hexagramNames[l][u];
            document.getElementById('hexagramSymbolSmall').innerText = hexagramSymbols[l][u];
        } else {
            document.getElementById('hexagramName').innerText = "查無此卦";
            document.getElementById('hexagramSymbolSmall').innerText = "";
        }


        // 重新繪製六爻
        yaoDisplay.innerHTML = '';
        const lines = [...trigramLinesMap[l], ...trigramLinesMap[u]];
        const meta = hexMeta[`${u},${l}`] || {p:0, s:6};
        const palaceElem = palaceElements[meta.p];
        const ying = meta.s > 3 ? meta.s - 3 : meta.s + 3;

        // 取得支、干、六親資訊
        const lowerBranches = trigramNaJia[l].b[0];
        const lowerStems = trigramNaJia[l].s[0];
        const upperBranches = trigramNaJia[u].b[1];
        const upperStems = trigramNaJia[u].s[1];
        const allBranches = [...lowerBranches, ...upperBranches];
        const allStems = [...lowerStems, ...lowerStems, ...lowerStems, ...upperStems, ...upperStems, ...upperStems]; // 簡化處理
        
        lines.forEach((isYang, i) => {
            const pos = i + 1;
            const branch = allBranches[i];
            const isVoid = voidBranches.includes(branch);
            const voidMark = isVoid ? '<span style="color: var(--accent-red); font-size: 14px; margin-left: 4px;">(空)</span>' : '';
            const stem = (i < 3) ? trigramNaJia[l].s[0] : trigramNaJia[u].s[1];
            const branchElem = branchElements[branch];
            const relation = getLiuQin(palaceElem, branchElem);
            const mark = (pos === meta.s) ? '世' : (pos === ying ? '應' : '');
            
            const wrapper = document.createElement('div');
            wrapper.className = 'yao-line-wrapper';
            
            // 1. 左側：世應標記
            const markBox = document.createElement('div');
            markBox.className = 'shi-ying-box';
            markBox.innerText = mark;
            
            // 2. 中間：卦象橫槓
            const bar = document.createElement('div');
            bar.className = `yao-bar ${isYang ? 'yang' : 'yin'}`;
            if (!isYang) bar.innerHTML = '<div class="segment"></div><div class="segment"></div>';
            
            // 3. 右側：整合資訊與五行顏色
            const textBox = document.createElement('div');
            textBox.className = `yao-text elem-${branchElem}`;
            textBox.innerHTML = `${relation}${branch}${branchElem}${voidMark}`;
            
            wrapper.append(markBox, bar, textBox);
            yaoDisplay.appendChild(wrapper);
        });
    }

    // 監聽輸入變化
    dateInput.addEventListener('change', updateConversion);
    timeInput.addEventListener('change', updateConversion);

    // 初始執行一次
    updateConversion();
</script>
